<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <title></title>
    <meta name="viewport" content="initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta http-equiv="Cache" content="no-cache" />

    <link rel="icon" href="./img/favicon.ico" />
    <link rel="stylesheet" type="text/css" href="./css/index.css" />
  </head>

  <body cz-shortcut-listen="true">
    <div class="body-loading" id="body_loading">
      <img src="./img/loading.gif" style="width: 320px; height: 240px" />
    </div>

    <div class="body-wrapper">
      <div class="body-background">
        <div class="body-background-mask"></div>
      </div>

      <div class="body-content-wrapper">
        <div class="body-content" id="body_content">
          <div class="content-decoration-wrapper">
            <!--logo-->
            <div class="content-logo-wrapper">
              <img class="content-logo" src="./img/logo.png" />
            </div>

            <!--venue info-->
            <div class="venue-info-wrapper" id="venue_info" style="display:none;">
              <div class="venue-name" id="venue_name"></div>
              <div class="venue-location">
                <span class="venue-location-label" data-i18n="venue_location"></span>
                <span class="venue-address" id="venue_address"></span>
              </div>
              <a class="whatsapp-btn" id="whatsapp_btn" href="#" target="_blank" rel="noopener noreferrer" aria-label="Contact venue on WhatsApp">
                <svg class="whatsapp-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor">
                  <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                </svg>
                <span data-i18n="contact_whatsapp"></span>
              </a>
            </div>
          </div>

          <div class="login-wrapper">
            <div class="login-form-wrapper">
              <div>
                <div class="login-form-title">
                </div>
              </div>

              <div class="login-item login-item-fixaccount hide">
                <input
                  class="rj-input"
                  type="text"
                  id="account_input"
                  data-i18n-placeholder="account"
                />
              </div>
              <div class="login-item login-item-fixaccount hide">
                <input
                  class="rj-input"
                  type="password"
                  id="account_password"
                  data-i18n-placeholder="password"
                />
              </div>
              <div class="login-item login-item-voucher hide">
                <input
                  class="rj-input"
                  type="text"
                  id="voucher_code"
                  data-i18n-placeholder="accesscode"
                />
              </div>
            </div>

            <div class="login-msg" id="login_msg"></div>
            <button
              class="rj-btn rj-btn-primary login-btn"
              id="login_btn"
              data-i18n="login"
            >
            </button>

            <div class="wifi-status hide" id="wifi_connect_status">
              <span class="status-icon"></span>
              <span class="status-text"></span>
            </div>

            <div class="other-btn-wrapper">
              <div class="login-split-line hide" id="login_split_line">
                <span class="left"></span>
                <span data-i18n="or">
                </span>
                <span class="right"></span>
              </div>
              <button
                class="rj-btn login-item login-item-pass hide"
                onclick="IndexObj.changeLoginOption('pass')"
                data-i18n="one_click_login"
              >
              </button>
              <button
                class="rj-btn login-item login-item-fixaccount hide"
                onclick="IndexObj.changeLoginOption('fixaccount')"
                data-i18n="account_login"
              >
              </button>
              <button
                class="rj-btn login-item login-item-voucher hide"
                onclick="IndexObj.changeLoginOption('voucher')"
                data-i18n="voucher_login"
              >
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="text/javascript" src="./js/jquery/jquery.min.js"></script>
    <script type="text/javascript" src="./js/language.js"></script>
    <script type="text/javascript" src="./js/i18n/i18n.js"></script>
    <script type="text/javascript" src="./js/index.js"></script>
    <script type="text/javascript" src="./js/redirect.js"></script>
    <script type="text/javascript" src="./js/wificonnect.js"></script>
    <script type="text/javascript">
      // Wrap loadConfig *before* loadConfig.json is evaluated so that
      // WiFiConnectObj is initialised in the same call that runs IndexObj.init.
      var _origLoadConfig = loadConfig;
      function loadConfig(data) {
        _origLoadConfig(data);
        WiFiConnectObj.init(data);
      }
    </script>
    <script type="text/javascript" src="./loadConfig.json"></script>
  </body>
</html>
